# created automatically epik8s-gen (0.4.3) at 2024-11-11
beamline: reallab
namespace: reallab

iocDefaults:
  motor:
    pva: true
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    autosync: false
    devgroup: mot
    opi: "motor-asyn/Motor_Main.bob"
  adcamera:
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    devgroup: cam
    devtype: camera
    template: "adcamera"
    pva: true
    enable_ingress: true
    autosync: false
    resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
    service:
      http:
        enable: true
        port: 8082
    env:
        - name: "EPICS_CAS_INTF_ADDR_LIST"
          value: "0.0.0.0"   ## bind CA server on all interfaces (required when multus is present)
        - name: "EPICS_PVAS_INTF_ADDR_LIST"
          value: "0.0.0.0"   ## bind PVA server on all interfaces (required when multus is present)
    iocparam:
        - name: "overlay_enable"
          value: true
        - name: "stats_enable"
          value: true
        - name: "proc_enable"
          value: true
        - name: "tiff_enable"
          value: true
        - name: "roi_enable"
          value: true
        - name: "stdarray_enable"
          value: false
        - name: "stream2_enable"
          value: true
    

epicsConfiguration:
  name: "epics-configuration" # name of existing configMap that set CA parameters
  address_list: "" ## modulator
  max_array_bytes: "10000000"
  privateNetwork:
    enabled: true
    name: epics-private
  # conn_tmo: 120
  services:
    pvagateway:
      asset: "Gateway for PVA external connections"
      charturl: 'https://baltig.infn.it/epics-containers/ca-gateway-chart.git'
      template: "pvagateway"
      desc: "EPICS PVA Gateway "
      loadbalancer: 192.168.108.230

    notebook:
      charturl: https://baltig.infn.it/epics-containers/jupyter-chart.git
      replicaCount: 1
      gitRepoConfig:
        url: https://baltig.infn.it/lnf-da-control/ecs-jupyter-control.git
        path: .
        branch: main
        init: true
      enable_ingress: true
      usegateway: true
      autosync: false
      pip:
        - bluesky
        - infn-ophyd-hal
        - p4p
    
  iocs:
    - name: "lasercam"
      template: "adcamera"
      iocprefix: "LAB:REAL"
      #hostNetwork: true
      zones: 
        - LAB
      networks:
        - name: "vlan-115"
          annotation: "euaps-cams"
      devices:
        - name: "CAM01"
          id: 192.176.66.101 # serial 40295676
          buffers: 500           
          iocinit:
          - name: "AcquirePeriod"
            value: "1"
          - name: "Stream1:EnableCallbacks"
            value: "1"

    - name: "thorlabs"
      asset: "" # TODO add when available
      template: "motor"
      devtype: thorlabs
      motor:
        motorType: kim
      iocprefix: "LAB:REAL:MOTOR" 
      
      zones: 
        - LAB
      iocparam:
        - name: "server"
          value: 192.176.66.100 #pldanteco120 
        - name: "port"
          value: "4001"  # TODO check
      devices:
          - name: "HMIR"
            axid: 0
            dllm: -1000000.0
            dhlm: 1000000.0
            home: 1
            velo: 500
            mres: 1
          - name: "VMIR"
            axid: 1
            dllm: -1000000.0
            dhlm: 1000000.0
            home: 1
            velo: 500
            mres: 1
          
    
  

    - name: "overlay-real-rnd"
      devtype: softioc
      iocprefix: "LAB:REAL:OVERLAY_RND"
      zones: 
        - REALLAB
      iocdir: "overlay_rnd"
      iocparam:
        - name: "CAM"
          value: "LAB:REAL:CAM01"
        - name: "PREFIX"
          value: "LAB:REAL:OVERLAY_RND"

    - name: "beam-center-real"
      devtype: softioc
      iocprefix: "LAB:REAL:BEAM_CENTER"
      zones:
        - REALLAB
      iocdir: "beam_center"
      iocparam:
        - name: "CAM"
          value: "LAB:REAL:CAM01"
        - name: "MOTX"
          value: "LAB:REAL:HMIR"
        - name: "MOTY"
          value: "LAB:REAL:VMIR"
        - name: "PREFIX"
          value: "LAB:REAL:BEAM_CENTER"

dashboard:
  backend:
    enabled: true

nfsMounts:
    - name: data
      path: /tmp/data
    - name: autosave
      path: /tmp/autosave
    - name: config
      path: /tmp/config

email:
  from: "phoebus@localhost"
  to: "phoebus@localhost"
  smtp:
    host: smtp.lnf.infn.it
    port: 25
    user: ""
    password: ""
    tls: false
    starttls: false
    auth: false

syncPolicy:
    automated:
      prune: true  # Optional: Automatically remove resources not specified in Helm chart
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 
      - Prune=true