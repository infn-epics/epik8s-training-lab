# created automatically epik8s-gen (0.4.3) at 2024-11-11
beamline: simlab
namespace: simlab

iocDefaults:
  motor:
    pva: true
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    autosync: false
    devgroup: mot
    opi: "motor-asyn/Motor_Main.bob"
  adcamera:
    charturl: 'https://github.com/infn-epics/ioc-chart.git'
    devgroup: cam
    devtype: camera
    template: "adcamera"
    pva: true
    enable_ingress: true
    autosync: false
    resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
    service:
      http:
        enable: true
        port: 8082
    env:
        - name: "EPICS_CAS_INTF_ADDR_LIST"
          value: "0.0.0.0"   ## bind CA server on all interfaces (required when multus is present)
        - name: "EPICS_PVAS_INTF_ADDR_LIST"
          value: "0.0.0.0"   ## bind PVA server on all interfaces (required when multus is present)
    iocparam:
        - name: "overlay_enable"
          value: true
        - name: "stats_enable"
          value: true
        - name: "proc_enable"
          value: true
        - name: "tiff_enable"
          value: true
        - name: "roi_enable"
          value: true
        - name: "stdarray_enable"
          value: false
        - name: "stream2_enable"
          value: true
    

epicsConfiguration:
  name: "epics-configuration" # name of existing configMap that set CA parameters
  address_list: "" ## modulator
  max_array_bytes: "10000000"
  privateNetwork:
    enabled: true
    name: epics-private
  # conn_tmo: 120
  services:
    pvagateway:
      asset: "Gateway for PVA external connections"
      charturl: 'https://baltig.infn.it/epics-containers/ca-gateway-chart.git'
      template: "pvagateway"
      desc: "EPICS PVA Gateway "
      loadbalancer: 192.168.108.230

    notebook:
      charturl: https://baltig.infn.it/epics-containers/jupyter-chart.git
      replicaCount: 1
      gitRepoConfig:
        url: https://baltig.infn.it/lnf-da-control/ecs-jupyter-control.git
        path: .
        branch: main
        init: true
      dataVolume:
        hostPath: notebook_examples
      enable_ingress: true
      usegateway: true
      autosync: false
      pip:
        - bluesky
        - infn-ophyd-hal
        - p4p
    
      
    
  iocs:
    
    
    - name: "motorsim"
      template: "motor"
      devtype: motorsim
      iocprefix: "LAB:SIM"
      zones: 
        - SIMLAB
      devices:
        - name: "HMIR"
          axid: 0
          dllm: -400.0
          dhlm: 400.0
          velo: 10.0
          mres: 0.01
          egu: mm
        - name: "VMIR"
          axid: 1
          dllm: -400.0
          dhlm: 400.0
          velo: 10.0
          mres: 0.01
          egu: mm

    
    - name: "camerasim"
      asset: "https://servicedesk.infn.it/secure/ObjectSchema.jspa?id=44&typeId=2748&objectId=126655"
      template: "adcamera"
      devtype: camerasim
      iocprefix: "LAB:SIM"
      zones: 
        - SIMLAB
      iocinit:
        - name: "AcquirePeriod"
          value: "1"
        - name: "FrameRate"
          value: "1"
        - name: "FrameRateEnable"
          value: "Yes"
      
      devices:
        - name: "CAM01"
          width: 1900
          height: 1200
          iocinit:
          - name: "AcquirePeriod"
            value: "1"
          - name: "Gain"
            value: "255"
          - name: "SimMode"
            value: "Peaks"
          - name: "PeakStartX"
            value: "250"
          - name: "PeakStartY"
            value: "200"
          - name: "PeakWidthX"
            value: "70"
          - name: "PeakWidthY"
            value: "50"
          - name: "PeakVariation"
            value: "10"
          - name: "Stream1:EnableCallbacks"
            value: "1"
          
            

        
    - name: "simtwin"
      devtype: softioc
      iocprefix: "LAB:SIM:TWIN"
      zones: 
        - SIMLAB
      iocdir: "simtwin"
      iocparam:
        - name: "HMIR"
          value: "LAB:SIM:HMIR"
        - name: "VMIR"
          value: "LAB:SIM:VMIR"
        - name: "CAM"
          value: "LAB:SIM:CAM01"

    - name: "overlay-sim-rnd"
      devtype: softioc
      iocprefix: "LAB:SIM:OVERLAY_RND"
      zones: 
        - SIMLAB
      iocdir: "overlay_rnd"
      iocparam:
        - name: "CAM"
          value: "LAB:SIM:CAM01"
        - name: "PREFIX"
          value: "LAB:SIM:OVERLAY_RND"

    - name: "beam-center-sim"
      devtype: softioc
      iocprefix: "LAB:SIM:BEAM_CENTER"
      zones:
        - SIMLAB
      iocdir: "beam_center"
      iocparam:
        - name: "CAM"
          value: "LAB:SIM:CAM01"
        - name: "MOTX"
          value: "LAB:SIM:HMIR"
        - name: "MOTY"
          value: "LAB:SIM:VMIR"
        - name: "PREFIX"
          value: "LAB:SIM:BEAM_CENTER"

dashboard:
  backend:
    enabled: true

nfsMounts:
    - name: data
      path: /tmp/data
    - name: autosave
      path: /tmp/autosave
    - name: config
      path: /tmp/config

email:
  from: "phoebus@localhost"
  to: "phoebus@localhost"
  smtp:
    host: smtp.lnf.infn.it
    port: 25
    user: ""
    password: ""
    tls: false
    starttls: false
    auth: false

syncPolicy:
    automated:
      prune: true  # Optional: Automatically remove resources not specified in Helm chart
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 
      - Prune=true